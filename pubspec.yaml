name: bdk_wallet_kit
description: Flutter-first app-level helpers for building Bitcoin wallet apps with BDK.
version: 0.1.0
repository: https://github.com/bitcoindevkit/bdk_wallet_kit
issue_tracker: https://github.com/bitcoindevkit/bdk_wallet_kit/issues

environment:
  sdk: ^3.6.0

dependencies:
  # TODO: Switch this adapter dependency to bdk_dart when the published package
  # and active Flutter SDK constraints line up. The local bdk_dart package is
  # currently Dart >=3.10, while this project is being verified on Dart 3.6.
  bdk_flutter: ^0.31.2
  flutter:
    sdk: flutter
  flutter_secure_storage: ^9.2.4
  meta: ^1.15.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
