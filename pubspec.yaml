name: bdk_wallet_kit
description: Flutter-first app-level helpers for building Bitcoin wallet apps with BDK.
version: 0.1.0
repository: https://github.com/bitcoindevkit/bdk_wallet_kit
issue_tracker: https://github.com/bitcoindevkit/bdk_wallet_kit/issues

environment:
  sdk: ^3.6.0

dependencies:
  # TODO: Enable bdk_dart here once the active Flutter SDK supports the package
  # constraint used by bdk-dart. The local bdk_dart package currently requires
  # Dart >=3.10 while this workspace is on Flutter 3.27 / Dart 3.6.
  # bdk_dart:
  #   path: ../bdk-dart
  flutter:
    sdk: flutter
  flutter_secure_storage: ^9.2.4
  meta: ^1.15.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
